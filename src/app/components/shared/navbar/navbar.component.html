<div class="flex h-screen overflow-hidden">

  <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-white shadow flex items-center px-4 z-50">

    <button (click)="toggle()" class="text-3xl text-gray-800 mr-3 leading-none">
      <i class="bi bi-list"></i>
    </button>

    <img src="assets/equinorte.png" class="h-8" />

  </div>

  <div
    class="fixed md:static top-0 left-0 h-full bg-white shadow-lg border-r border-gray-200
           transition-all duration-300 z-40 overflow-hidden"
    [class.w-64]="!collapsed"
    [class.w-16]="collapsed">

    <div class="flex items-center p-4 border-b border-gray-200">

      <img
        *ngIf="!collapsed"
        src="assets/equinorte.png"
        class="h-10 object-contain"
      />

      <button (click)="toggle()" class="ml-auto text-gray-700 hover:text-black text-2xl">
        <i class="bi bi-list"></i>
      </button>

    </div>

    <nav class="flex flex-col gap-2 p-2">

      <a routerLink="/consulta"
         routerLinkActive="bg-[#ec3b00] text-white"
         class="flex items-center gap-3 p-2 rounded-lg text-gray-700 hover:bg-[#ec3b00] hover:text-white transition">

        <i class="bi bi-search text-lg w-6 text-center"></i>
        <span *ngIf="!collapsed">Consulta</span>

      </a>

      <a routerLink="/recalculo"
         routerLinkActive="bg-[#ec3b00] text-white"
         class="flex items-center gap-3 p-2 rounded-lg text-gray-700 hover:bg-[#ec3b00] hover:text-white transition">

        <i class="bi bi-calculator text-lg w-6 text-center"></i>
        <span *ngIf="!collapsed">Recálculo</span>

      </a>

      <a routerLink="/resultado"
         routerLinkActive="bg-[#ec3b00] text-white"
         class="flex items-center gap-3 p-2 rounded-lg text-gray-700 hover:bg-[#ec3b00] hover:text-white transition">

        <i class="bi bi-table text-lg w-6 text-center"></i>
        <span *ngIf="!collapsed">Resultado</span>

      </a>

    </nav>

  </div>

  <div class="flex-1 bg-gray-100 p-6 overflow-auto pt-16 md:pt-6 w-full">
    <router-outlet></router-outlet>
  </div>

</div>
