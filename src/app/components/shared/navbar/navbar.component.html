<div class="flex h-screen bg-gray-100 overflow-hidden">

  <div
    *ngIf="sidebarOpen"
    (click)="closeSidebar()"
    class="fixed inset-0 bg-black/40 z-40 md:hidden">
  </div>

  <div class="md:hidden fixed top-0 left-0 right-0 h-14 bg-white shadow flex items-center px-4 z-50">

    <button
      (click)="toggleMobile()"
      class="text-2xl text-gray-700 mr-3">
      <i class="bi bi-list"></i>
    </button>

    <img src="assets/equinorte.png" class="h-8" />

  </div>

  <aside
    class="fixed md:relative top-0 left-0 h-full bg-white border-r border-gray-200 shadow-lg transition-all duration-300 z-50"
    [class.-translate-x-full]="!sidebarOpen && !isDesktop"
    [class.translate-x-0]="sidebarOpen || isDesktop"
    [class.w-64]="!collapsed"
    [class.w-20]="collapsed">

    <div class="flex items-center h-16 px-4 border-b">

      <img
        *ngIf="!collapsed"
        src="assets/equinorte.png"
        class="h-10 object-contain"
      />

      <button
        (click)="toggleCollapse()"
        class="ml-auto text-xl text-gray-700 hover:text-black hidden md:block">
        <i class="bi bi-list"></i>
      </button>

      <button
        (click)="closeSidebar()"
        class="ml-auto text-xl text-gray-700 md:hidden">
        <i class="bi bi-x-lg"></i>
      </button>

    </div>

    <nav class="p-3 space-y-2">

      <a
        routerLink="/consulta"
        routerLinkActive="bg-[#ec3b00] text-white"
        class="flex items-center gap-3 px-3 py-3 rounded-xl text-gray-700 hover:bg-[#ec3b00] hover:text-white transition">

        <i class="bi bi-search text-lg min-w-[24px] text-center"></i>

        <span *ngIf="!collapsed">
          Consulta
        </span>

      </a>

      <a
        routerLink="/recalculo"
        routerLinkActive="bg-[#ec3b00] text-white"
        class="flex items-center gap-3 px-3 py-3 rounded-xl text-gray-700 hover:bg-[#ec3b00] hover:text-white transition">

        <i class="bi bi-calculator text-lg min-w-[24px] text-center"></i>

        <span *ngIf="!collapsed">
          Recálculo
        </span>

      </a>

   

    </nav>

  </aside>

  <main class="flex-1 overflow-auto pt-14 md:pt-0">
    <router-outlet></router-outlet>

  </main>

</div>
